app:
  name: "RAG知识库问答"
  mode: chat
  description: "上传文档→自动分段→向量化→用户提问→检索+生成回答。支持PDF/Word/TXT/网页"
  icon: "📚"
model_config:
  provider: deepseek
  name: deepseek-v4-pro
  completion_params:
    temperature: 0.7
    max_tokens: 2000
retrieval:
  enabled: true
  search_method: hybrid_search
  reranking:
    enabled: true
    provider: qwen
    model: qwen-turbo
dataset:
  retrieval_model:
    search_method: hybrid
    top_k: 5
    score_threshold: 0.5
prompt_template:
  system: "你是一个知识库问答助手。请根据以下参考资料回答用户问题。如果资料中没有相关信息，请如实告知。\n\n参考资料:\n{{#context#}}"
  user: "{{#query#}}"
author: AgentHub-U
